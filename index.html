<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華饌 北方麵食館 訂餐系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts: Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            /* 暖色系背景，帶有輕微溫馨感 */
            background-color: #FDF8F5; 
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png'); 
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-shadow { box-shadow: 0 4px 20px rgba(180, 83, 9, 0.08); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fcd34d; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #fbbf24; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 綁定你提供的 Google Apps Script URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzJwtjB0rzVVt0Od-vjzPQF7_sODKaLza1iLJCaBYpwVa1zJw2588VMd5BR8tolluI/exec";
        const SYSTEM_NAME = "華饌 北方麵食館"; // 可自行修改餐廳名稱

        // 加入參考資料中的人員名單
        const employees = [
            '柳奇宏', '力乃青', '董懿嫺', '李岱娟', '林炫均', '黃筱淇', '林家意', 
            '蔡雙全', '吳建毅', '崔文沛', '涂有丞', '林澄洋', '崔顯亞', '湯暉恆', 
            '洪寶清', '賴奕勳', '吳國禎', '俞家雄', '黃琮群', '吳欣玫', '滿昱綸', '張嗣賢', 
            '楊瑞銘', '方宗尉', '蔡尚霖', '劉建仁', '石玉嬋', 
            '賴庭玉', '黃瑞勳', '楊正財', '林于盛', '薛年慶'
        ];

        // 根據菜單圖片建立的資料庫
        const menuData = {
            "熱炒類": [
                { name: "合菜戴帽(附餅皮)", price: 220 },
                { name: "鳳梨蝦球", price: 240 },
                { name: "金沙中卷", price: 240 },
                { name: "京醬肉絲(附餅皮)", price: 220 },
                { name: "糖醋魚片", price: 200 },
                { name: "蔥爆牛肉", price: 210 },
                { name: "蔥爆豬肉", price: 180 },
                { name: "宮保雞丁", price: 200 },
                { name: "金沙豆腐", price: 160 },
                { name: "椒鹽杏鮑菇", price: 150 },
                { name: "蝦仁炒蛋", price: 180 },
                { name: "開陽白菜", price: 150 },
                { name: "鹹蛋苦瓜", price: 150 },
                { name: "紅燒家常豆腐", price: 150 },
                { name: "菜脯蛋", price: 120 },
                { name: "炒空心菜", price: 80 },
                { name: "炒高麗菜", price: 80 },
                { name: "水蓮", price: 120 },
                { name: "沙茶羊肉", price: 180 }
            ],
            "粥/飯類": [
                { name: "白飯", price: 15 },
                { name: "小米粥", price: 30 },
                { name: "老鍋肉燥飯", price: 50 },
                { name: "排骨飯", price: 100 },
                { name: "沙茶牛肉炒飯", price: 110 },
                { name: "肉絲蛋炒飯", price: 80 },
                { name: "蝦仁蛋炒飯", price: 90 },
                { name: "鮭魚蛋炒飯", price: 90 },
                { name: "鳳梨炒飯", price: 80 },
                { name: "素食炒飯", price: 80 },
                { name: "豬肉燴飯", price: 80 },
                { name: "牛肉燴飯", price: 110 },
                { name: "羊肉燴飯", price: 100 }
            ],
            "麵類": [
                { name: "牛肉炒麵", price: 110 },
                { name: "三鮮炒麵", price: 100 },
                { name: "木須肉炒麵", price: 90 },
                { name: "素食炒麵", price: 80 },
                { name: "牛肉炒貓耳朵", price: 110 },
                { name: "三鮮炒貓耳朵", price: 100 },
                { name: "木須炒貓耳朵", price: 90 },
                { name: "牛肉炒餅", price: 130 },
                { name: "三鮮炒餅", price: 110 },
                { name: "木須肉炒餅", price: 100 },
                { name: "牛半筋半肉麵", price: 160 },
                { name: "清燉牛肉麵", price: 140 },
                { name: "紅燒牛肉麵", price: 140 },
                { name: "大滷麵", price: 100 },
                { name: "餛飩湯麵", price: 80 },
                { name: "榨菜肉絲麵", price: 80 },
                { name: "酸辣麵", price: 85 },
                { name: "醡醬麵", price: 75 },
                { name: "麻醬麵", price: 75 },
                { name: "紅油抄手(單點)", price: 70 },
                { name: "肉燥乾麵", price: 75 }
            ],
            "水餃/湯包/餅類": [
                { name: "招牌水餃", price: 7 },
                { name: "韭菜盒", price: 40 },
                { name: "豬肉餡餅(顆)", price: 50 },
                { name: "牛肉餡餅(顆)", price: 55 },
                { name: "蔥油餅", price: 60 },
                { name: "(甜)烙餅", price: 70 },
                { name: "(鹹)烙餅", price: 70 },
                { name: "酸辣湯餃", price: 90 },
                { name: "牛肉湯餃", price: 90 },
                { name: "榨菜肉絲湯餃", price: 90 },
                { name: "花素蒸餃", price: 100 },
                { name: "蝦仁蒸餃", price: 100 },
                { name: "小籠湯包", price: 100 },
                { name: "生菜沙拉捲餅", price: 90 },
                { name: "豬肉捲餅", price: 90 },
                { name: "燻雞肉捲餅", price: 90 },
                { name: "牛肉捲餅", price: 110 },
                { name: "鍋貼", price: 60 },
                { name: "蛋黃流沙包", price: 35 },
                { name: "芝麻流沙包", price: 35 }
            ],
            "湯類": [
                { name: "紫菜湯", price: 25 },
                { name: "酸辣湯", price: 40 },
                { name: "玉米濃湯", price: 40 },
                { name: "青菜豆腐湯", price: 40 },
                { name: "青菜蛋花湯", price: 40 },
                { name: "蛤蜊湯", price: 50 },
                { name: "苦瓜排骨湯", price: 50 }
            ]
        };

        const getMenuPrice = (itemName) => {
            for (const category of Object.values(menuData)) {
                const item = category.find(i => i.name === itemName);
                if (item) return item.price;
            }
            return 0; 
        };

        const App = () => {
            const [selectedUser, setSelectedUser] = useState("");
            const [cart, setCart] = useState({});
            const [orders, setOrders] = useState([]);
            const [activeCategory, setActiveCategory] = useState("熱炒類");
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [syncStatus, setSyncStatus] = useState("載入中...");
            const [editingOrderId, setEditingOrderId] = useState(null);

            useEffect(() => {
                const savedOrders = localStorage.getItem(`localOrders_${SYSTEM_NAME}`);
                if (savedOrders) setOrders(JSON.parse(savedOrders));
                
                if (SCRIPT_URL && SCRIPT_URL.includes("script.google.com")) {
                    fetchOrders(SCRIPT_URL);
                } else {
                    setSyncStatus("未設定雲端網址");
                }
            }, []);

            const fetchOrders = async (url) => {
                if (!url) return;
                setSyncStatus("連線同步中...");
                try {
                    const targetUrl = `${url}?action=getOrders&systemName=${encodeURIComponent(SYSTEM_NAME)}`;
                    const response = await fetch(targetUrl);
                    const result = await response.json();
                    if (result.status === "success") {
                        setOrders(result.data);
                        localStorage.setItem(`localOrders_${SYSTEM_NAME}`, JSON.stringify(result.data));
                        setSyncStatus("已同步");
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                    setSyncStatus("連線失敗");
                }
            };

            const handleUpdateItem = (item, delta) => {
                setCart(prev => {
                    const currentQty = prev[item.name]?.quantity || 0;
                    const newQty = Math.max(0, currentQty + delta);
                    if (newQty === 0) {
                        const newCart = { ...prev };
                        delete newCart[item.name];
                        return newCart;
                    }
                    const itemPrice = item.price !== undefined ? Number(item.price) : getMenuPrice(item.name);
                    return { ...prev, [item.name]: { price: itemPrice, quantity: newQty } };
                });
            };

            const cartTotal = useMemo(() => {
                return Object.values(cart).reduce((sum, item) => sum + ((Number(item.price) || 0) * (Number(item.quantity) || 0)), 0);
            }, [cart]);

            const totalOrdersAmount = useMemo(() => {
                return orders.reduce((sum, order) => sum + (Number(order.total) || 0), 0);
            }, [orders]);

            const submitOrder = async () => {
                if (!selectedUser) { alert("請選擇訂餐人！"); return; }
                if (Object.keys(cart).length === 0) { alert("請先選擇餐點！"); return; }

                setIsSubmitting(true);
                const orderId = editingOrderId ? editingOrderId : Date.now().toString();
                const orderData = {
                    id: String(orderId),
                    user: selectedUser,
                    items: cart,
                    total: cartTotal,
                    timestamp: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' }),
                    systemName: SYSTEM_NAME,
                    action: 'create' 
                };

                const newOrders = editingOrderId 
                    ? orders.map(o => String(o.id) === String(editingOrderId) ? orderData : o) 
                    : [orderData, ...orders];
                setOrders(newOrders);
                localStorage.setItem(`localOrders_${SYSTEM_NAME}`, JSON.stringify(newOrders));
                
                if (SCRIPT_URL && SCRIPT_URL.includes("script.google.com")) {
                    try {
                        if (editingOrderId) {
                            const delUrl = `${SCRIPT_URL}?action=delete&id=${editingOrderId}&uid=${editingOrderId}&systemName=${encodeURIComponent(SYSTEM_NAME)}`;
                            await fetch(delUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: 'delete', actionType: 'delete', id: String(editingOrderId), uid: String(editingOrderId), orderId: String(editingOrderId), systemName: SYSTEM_NAME }),
                            });
                            fetch(delUrl, { mode: 'no-cors' }).catch(() => {});
                            await new Promise(resolve => setTimeout(resolve, 500));
                        }
                        await fetch(SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(orderData),
                        });
                    } catch (error) {
                        console.error("提交失敗", error);
                    }
                }

                setCart({});
                setEditingOrderId(null); 
                if (!editingOrderId) setSelectedUser(""); 
                setIsSubmitting(false);
                alert(editingOrderId ? "修改成功！" : "點餐成功！");
            };

            const deleteOrder = async (orderId) => {
                if (!confirm("確定要刪除這筆訂單嗎？")) return;
                
                const newOrders = orders.filter(o => String(o.id) !== String(orderId));
                setOrders(newOrders);
                localStorage.setItem(`localOrders_${SYSTEM_NAME}`, JSON.stringify(newOrders));

                if (SCRIPT_URL && SCRIPT_URL.includes("script.google.com")) {
                    try {
                        const delUrl = `${SCRIPT_URL}?action=delete&id=${orderId}&uid=${orderId}&systemName=${encodeURIComponent(SYSTEM_NAME)}`;
                        await fetch(delUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ action: 'delete', actionType: 'delete', id: String(orderId), uid: String(orderId), orderId: String(orderId), systemName: SYSTEM_NAME }),
                        });
                        fetch(delUrl, { mode: 'no-cors' }).catch(() => {});
                    } catch (error) {
                        console.error("刪除失敗", error);
                    }
                }
            };

            const handleEditOrder = (order) => {
                if (Object.keys(cart).length > 0 && !editingOrderId) {
                    if (!window.confirm("購物車中還有未送出的餐點，確定要放棄並修改舊訂單嗎？")) return;
                }
                setSelectedUser(order.user);
                
                const safeCart = {};
                Object.entries(order.items || {}).forEach(([name, data]) => {
                    safeCart[name] = {
                        quantity: Number(data.quantity) || 1,
                        price: data.price !== undefined ? Number(data.price) : getMenuPrice(name)
                    };
                });
                
                setCart(safeCart);
                setEditingOrderId(String(order.id));
            };

            const cancelEdit = () => {
                setEditingOrderId(null);
                setCart({});
                setSelectedUser("");
            };

            const copyToExcel = () => {
                if (orders.length === 0) { alert("目前沒有訂單可以複製！"); return; }
                let tsv = "時間\t訂餐人\t餐點內容\t總金額\n";
                orders.forEach(order => {
                    const itemsText = Object.entries(order.items)
                        .map(([name, data]) => `${name} x${data.quantity}`)
                        .join(", ");
                    tsv += `${order.timestamp}\t${order.user}\t${itemsText}\t${order.total}\n`;
                });
                const textarea = document.createElement('textarea');
                textarea.value = tsv; document.body.appendChild(textarea);
                textarea.select();
                try { document.execCommand('copy'); alert("✅ 已複製到剪貼簿！"); } 
                catch (err) { alert("複製失敗。"); }
                document.body.removeChild(textarea);
            };

            const itemSummary = useMemo(() => {
                const summary = {};
                orders.forEach(order => {
                    Object.entries(order.items || {}).forEach(([itemName, data]) => {
                        if (!summary[itemName]) {
                            summary[itemName] = { quantity: 0, price: data.price !== undefined ? Number(data.price) : getMenuPrice(itemName) };
                        }
                        summary[itemName].quantity += Number(data.quantity);
                    });
                });
                return Object.entries(summary).sort((a, b) => b[1].quantity - a[1].quantity);
            }, [orders]);

            const copySummaryToExcel = () => {
                if (itemSummary.length === 0) { alert("沒有商品可以複製！"); return; }
                let tsv = "商品名稱\t總數量\t單價\t總金額\n";
                itemSummary.forEach(([name, data]) => {
                    tsv += `${name}\t${data.quantity}\t${data.price}\t${data.price * data.quantity}\n`;
                });
                const textarea = document.createElement('textarea');
                textarea.value = tsv; document.body.appendChild(textarea);
                textarea.select();
                try { document.execCommand('copy'); alert("✅ 統計資料已複製到剪貼簿！"); } 
                catch (err) { alert("複製失敗。"); }
                document.body.removeChild(textarea);
            };

            return (
                <div className="min-h-screen py-6 font-sans">
                    <div className="max-w-[1400px] mx-auto px-4 flex flex-col gap-6">
                        
                        {/* 頂部標頭 & 選擇訂餐人 */}
                        <div className="bg-white p-6 rounded-2xl custom-shadow border-t-4 border-amber-600 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div>
                                <h1 className="text-3xl font-black text-amber-900 tracking-wider mb-2 flex items-center gap-2">
                                    🍜 <span className="text-amber-700">{SYSTEM_NAME}</span>
                                </h1>
                                <div className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-6 text-slate-500 font-medium text-sm">
                                    <span className="flex items-center gap-1.5 bg-amber-50 text-amber-800 px-3 py-1 rounded-full border border-amber-200">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                        </svg>
                                        訂購專線：(07) 2228579
                                    </span>
                                </div>
                            </div>
                            
                            <div className="flex flex-col items-end gap-3 w-full md:w-auto">
                                <span className="text-xs font-bold px-3 py-1 bg-slate-100 text-slate-600 rounded-md border border-slate-200 flex items-center gap-2">
                                    <span className={`w-2 h-2 rounded-full ${syncStatus.includes("失敗") ? 'bg-red-500' : 'bg-green-500 animate-pulse'}`}></span>
                                    {syncStatus}
                                </span>
                                <div className="flex items-center gap-3 w-full">
                                    <label className="text-slate-700 text-sm font-bold whitespace-nowrap shrink-0">👤 訂餐人：</label>
                                    <select 
                                        className="w-full md:w-64 border-slate-300 border p-2.5 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-amber-500 bg-amber-50/30 outline-none transition-all font-medium text-slate-800"
                                        value={selectedUser}
                                        onChange={(e) => setSelectedUser(e.target.value)}
                                    >
                                        <option value="">-- 點擊選擇姓名 --</option>
                                        {employees.map(emp => <option key={emp} value={emp}>{emp}</option>)}
                                    </select>
                                </div>
                            </div>
                        </div>

                        {/* 下方三欄式版面 */}
                        <div className="flex flex-col lg:flex-row gap-6 items-start">
                            
                            {/* 第一欄：最左側 - 菜單分類 */}
                            <div className="w-full lg:w-44 bg-white p-3 rounded-2xl custom-shadow shrink-0 lg:sticky lg:top-4">
                                <div className="flex flex-row lg:flex-col overflow-x-auto lg:overflow-visible hide-scrollbar gap-2">
                                    {Object.keys(menuData).map(category => (
                                        <button
                                            key={category}
                                            onClick={() => setActiveCategory(category)}
                                            className={`whitespace-nowrap w-full text-center lg:text-left px-4 py-3 rounded-xl font-bold transition-all ${
                                                activeCategory === category 
                                                ? "bg-amber-600 text-white shadow-md lg:translate-x-1" 
                                                : "bg-transparent text-slate-600 hover:bg-amber-50 border border-slate-100 lg:border-none"
                                            }`}
                                        >
                                            {category}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* 第二欄：中間 - 菜單列表 */}
                            <div className="w-full lg:w-[380px] bg-white p-4 rounded-2xl custom-shadow shrink-0 lg:sticky lg:top-4 lg:max-h-[calc(100vh-2rem)] overflow-y-auto custom-scrollbar">
                                <h2 className="text-lg font-black text-amber-900 mb-4 pb-2 border-b-2 border-amber-100 flex items-center gap-2">
                                    <span className="text-amber-500">|</span> {activeCategory}
                                </h2>
                                <div className="space-y-1 pr-1">
                                    {menuData[activeCategory].map(item => {
                                        const qty = cart[item.name]?.quantity || 0;
                                        return (
                                            <div key={item.name} className="flex justify-between items-center p-3 hover:bg-amber-50/50 rounded-xl border border-transparent hover:border-amber-100 transition-colors">
                                                <div className="pr-2">
                                                    <div className="font-bold text-slate-800 text-base">{item.name}</div>
                                                    <div className="text-amber-600 font-semibold text-sm mt-0.5">${item.price}</div>
                                                </div>
                                                <div className="flex items-center gap-2 bg-white border border-amber-200 rounded-full px-1.5 py-1 shrink-0">
                                                    <button 
                                                        onClick={() => handleUpdateItem(item, -1)} 
                                                        className={`w-7 h-7 rounded-full flex items-center justify-center font-bold transition-colors ${qty > 0 ? 'bg-amber-100 text-amber-800 hover:bg-amber-200' : 'bg-transparent text-slate-300 cursor-not-allowed'}`}
                                                        disabled={qty === 0}
                                                    >-</button>
                                                    <span className={`font-bold w-5 text-center text-sm ${qty > 0 ? 'text-amber-700' : 'text-slate-400'}`}>{qty}</span>
                                                    <button 
                                                        onClick={() => handleUpdateItem(item, 1)} 
                                                        className="w-7 h-7 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center hover:bg-amber-100 border border-amber-200 font-bold transition-colors"
                                                    >+</button>
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            {/* 第三欄：右側 - 購物車與訂單板 */}
                            <div className="flex-1 w-full flex flex-col gap-6 lg:sticky lg:top-4 lg:max-h-[calc(100vh-2rem)] overflow-y-auto custom-scrollbar lg:pr-2 pb-4">
                                
                                {/* 購物車區塊 */}
                                {!editingOrderId && (
                                    <div className="bg-white p-6 rounded-2xl custom-shadow border-t-4 border-slate-800 shrink-0">
                                        <h2 className="text-xl font-black mb-5 pb-3 flex items-center justify-between border-b-2 border-slate-100 text-slate-800">
                                            <span>🛒 我的點餐單</span>
                                            {Object.keys(cart).length > 0 && <span className="text-sm text-amber-700 bg-amber-50 px-3 py-1 rounded-full border border-amber-200">{Object.keys(cart).length} 項</span>}
                                        </h2>
                                        
                                        {Object.keys(cart).length === 0 ? (
                                            <div className="text-slate-400 text-center py-6 flex flex-col items-center gap-2">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                                                </svg>
                                                <p className="text-sm font-medium">請從左側菜單選擇餐點</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-3 mb-6 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar">
                                                {Object.entries(cart).map(([name, data]) => (
                                                    <div key={name} className="flex justify-between items-center text-sm border-b border-slate-100 pb-3 last:border-0 last:pb-0">
                                                        <div className="flex-1 pr-4">
                                                            <div className="text-slate-700 font-bold text-base">{name}</div>
                                                            <div className="text-amber-600 font-medium text-xs mt-0.5">${data.price * data.quantity}</div>
                                                        </div>
                                                        <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-full px-2 py-1">
                                                            <button onClick={() => handleUpdateItem({name, price: data.price}, -1)} className="w-8 h-8 rounded-full bg-white text-slate-600 flex items-center justify-center hover:bg-slate-200 font-bold shadow-sm transition-colors">-</button>
                                                            <span className="font-bold w-6 text-center text-amber-700 text-base">{data.quantity}</span>
                                                            <button onClick={() => handleUpdateItem({name, price: data.price}, 1)} className="w-8 h-8 rounded-full bg-amber-50 text-amber-700 flex items-center justify-center hover:bg-amber-100 border border-amber-200 font-bold shadow-sm transition-colors">+</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                                            <div className="flex items-center gap-4 w-full sm:w-auto">
                                                <span className="font-bold text-slate-600">總計金額</span>
                                                <span className="text-3xl font-black text-amber-700">${cartTotal}</span>
                                            </div>
                                            <button 
                                                onClick={submitOrder}
                                                disabled={isSubmitting || Object.keys(cart).length === 0}
                                                className={`w-full sm:w-48 py-3 rounded-lg font-bold text-white transition-all transform active:scale-95 ${
                                                    isSubmitting || Object.keys(cart).length === 0 
                                                    ? "bg-slate-300 cursor-not-allowed shadow-none" 
                                                    : "bg-amber-600 hover:bg-amber-700 shadow-lg shadow-amber-600/30"
                                                }`}
                                            >
                                                {isSubmitting ? "處理中..." : "送出訂單"}
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* 下方並排：訂單總覽 與 商品統計 */}
                                <div className="grid grid-cols-1 xl:grid-cols-2 gap-6 items-start">
                                    
                                    {/* 即時訂單板 */}
                                    <div className={`bg-white p-6 rounded-2xl custom-shadow ${editingOrderId ? 'border-t-4 border-blue-500 xl:col-span-2' : ''}`}>
                                        <h2 className="text-lg font-black text-slate-800 mb-5 flex flex-wrap items-center gap-2 pb-3 border-b-2 border-slate-100">
                                            📋 今日單號紀錄
                                            <span className="bg-slate-800 text-white text-xs px-2.5 py-1 rounded-md">{orders.length} 筆</span>
                                            <span className="bg-amber-50 text-amber-700 border border-amber-200 font-bold text-xs px-2.5 py-1 rounded-md flex-shrink-0">總計 ${totalOrdersAmount}</span>
                                            
                                            <button onClick={copyToExcel} className="ml-auto text-sm bg-green-600 text-white px-3 py-1.5 rounded-md hover:bg-green-700 transition-colors shadow-sm font-medium flex items-center gap-1">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                                                複製
                                            </button>
                                        </h2>
                                        
                                        <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                            {orders.length === 0 ? (
                                                <p className="text-slate-400 text-center py-6 text-sm font-medium">目前尚無訂單</p>
                                            ) : (
                                                orders.map(order => {
                                                    // 修改模式下的卡片外觀
                                                    if (String(editingOrderId) === String(order.id)) {
                                                        return (
                                                            <div key={order.id} className="p-4 rounded-xl border-2 border-blue-400 bg-blue-50 shadow-md relative transition-all">
                                                                <div className="flex justify-between items-center mb-4 border-b border-blue-200 pb-3">
                                                                    <div className="flex items-center gap-2 flex-1">
                                                                        <span className="text-xs bg-blue-600 text-white px-2 py-1.5 rounded flex-shrink-0 font-bold flex items-center gap-1 animate-pulse">✏️ 編輯中</span>
                                                                        <select 
                                                                            className="border border-blue-300 p-2 rounded-lg focus:ring-2 focus:ring-blue-500 bg-white outline-none font-bold text-slate-800 text-sm flex-1 ml-1"
                                                                            value={selectedUser}
                                                                            onChange={(e) => setSelectedUser(e.target.value)}
                                                                        >
                                                                            <option value="">-- 選擇訂餐人 --</option>
                                                                            {employees.map(emp => <option key={emp} value={emp}>{emp}</option>)}
                                                                        </select>
                                                                    </div>
                                                                </div>
                                                                
                                                                <div className="text-sm space-y-2 mb-4 bg-white p-3 rounded-lg border border-blue-100 shadow-inner max-h-[300px] overflow-y-auto custom-scrollbar">
                                                                    {Object.keys(cart).length === 0 ? (
                                                                        <div className="text-slate-400 text-center py-6 text-xs font-medium">購物車已空，請從左側加入餐點</div>
                                                                    ) : (
                                                                        Object.entries(cart).map(([itemName, itemData]) => (
                                                                            <div key={itemName} className="flex justify-between items-center border-b border-slate-50 pb-2.5 pt-1 last:border-0 last:pb-0">
                                                                                <div className="flex-1 pr-2">
                                                                                    <div className="text-slate-700 font-bold">{itemName}</div>
                                                                                    <div className="text-amber-600 font-medium text-xs mt-0.5">${itemData.price * itemData.quantity}</div>
                                                                                </div>
                                                                                <div className="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-full px-1.5 py-1">
                                                                                    <button onClick={() => handleUpdateItem({name: itemName, price: itemData.price}, -1)} className="w-7 h-7 rounded-full bg-white text-slate-600 flex items-center justify-center hover:bg-slate-200 font-bold shadow-sm">-</button>
                                                                                    <span className="font-bold w-6 text-center text-blue-700 text-base">{itemData.quantity}</span>
                                                                                    <button onClick={() => handleUpdateItem({name: itemName, price: itemData.price}, 1)} className="w-7 h-7 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center hover:bg-blue-200 font-bold shadow-sm">+</button>
                                                                                </div>
                                                                            </div>
                                                                        ))
                                                                    )}
                                                                </div>
                                                                
                                                                <div className="flex justify-between items-center bg-white p-3 rounded-lg border border-blue-200 mb-4">
                                                                    <span className="font-bold text-blue-800 text-sm">修改後總計</span>
                                                                    <span className="text-2xl font-black text-amber-700">${cartTotal}</span>
                                                                </div>
                                                                
                                                                <div className="flex gap-3">
                                                                    <button onClick={cancelEdit} disabled={isSubmitting} className="flex-1 py-2.5 rounded-lg font-bold text-blue-800 bg-white border-2 border-blue-200 hover:bg-blue-50 text-sm">取消修改</button>
                                                                    <button onClick={submitOrder} disabled={isSubmitting || Object.keys(cart).length === 0} className="flex-1 py-2.5 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 text-sm shadow-md">儲存訂單</button>
                                                                </div>
                                                            </div>
                                                        );
                                                    }

                                                    // 一般模式卡片
                                                    return (
                                                        <div key={order.id} className="p-4 rounded-xl border relative group transition-all bg-white border-slate-200 hover:border-amber-300">
                                                            <div className="flex justify-between items-center mb-3">
                                                                <span className="font-black text-slate-800 text-base flex items-center gap-2">
                                                                    <span className="w-6 h-6 rounded-full bg-amber-100 text-amber-700 flex items-center justify-center text-xs">📍</span>
                                                                    {order.user}
                                                                </span>
                                                                <div className="flex items-center gap-1.5">
                                                                    <span className="text-xs text-slate-400 font-medium">{order.timestamp}</span>
                                                                    <button onClick={() => handleEditOrder(order)} className="text-blue-600 hover:text-blue-700 text-xs px-2 py-1 rounded bg-blue-50 opacity-0 group-hover:opacity-100 transition-opacity font-bold">修改</button>
                                                                    <button onClick={() => deleteOrder(order.id)} className="text-red-600 hover:text-red-700 text-xs px-2 py-1 rounded bg-red-50 opacity-0 group-hover:opacity-100 transition-opacity font-bold">刪除</button>
                                                                </div>
                                                            </div>
                                                            <div className="text-sm space-y-1.5 mb-3 bg-slate-50 p-2.5 rounded-lg">
                                                                {Object.entries(order.items).map(([itemName, itemData]) => {
                                                                    const itemPrice = itemData.price !== undefined ? Number(itemData.price) : getMenuPrice(itemName);
                                                                    return (
                                                                        <div key={itemName} className="flex justify-between items-center text-slate-600 font-medium border-b border-slate-100 pb-1 last:border-0 last:pb-0">
                                                                            <span>{itemName}</span>
                                                                            <div className="flex items-center gap-2">
                                                                                <span className="text-slate-400 text-xs">${itemPrice * itemData.quantity}</span>
                                                                                <span className="text-slate-800 font-bold">x{itemData.quantity}</span>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                            <div className="text-right font-black text-sm text-amber-700 border-t border-slate-100 pt-2">
                                                                小計 ${order.total || 0}
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>

                                    {/* 商品總數統計板 */}
                                    {!editingOrderId && (
                                        <div className="bg-white p-6 rounded-2xl custom-shadow">
                                            <h2 className="text-lg font-black text-slate-800 mb-5 flex flex-wrap items-center gap-2 pb-3 border-b-2 border-slate-100">
                                                📊 廚房備料統計
                                                <button onClick={copySummaryToExcel} className="ml-auto text-sm bg-slate-600 text-white px-3 py-1.5 rounded-md hover:bg-slate-700 transition-colors shadow-sm font-medium flex items-center gap-1">
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                                                    複製
                                                </button>
                                            </h2>
                                            
                                            <div className="space-y-2 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                                {itemSummary.length === 0 ? (
                                                    <p className="text-slate-400 text-center py-6 text-sm font-medium">尚無商品資料</p>
                                                ) : (
                                                    itemSummary.map(([name, data]) => (
                                                        <div key={name} className="flex justify-between items-center text-sm border-b border-slate-50 pb-2.5 pt-1 last:border-0 last:pb-0 hover:bg-slate-50 transition-colors px-1 rounded">
                                                            <span className="text-slate-700 font-bold flex-1 pr-2 leading-tight">{name}</span>
                                                            <div className="flex items-center gap-2 shrink-0">
                                                                <span className="text-slate-400 text-xs font-medium text-right">${data.price * data.quantity}</span>
                                                                <span className="bg-amber-50 text-amber-700 font-black px-2 py-1 rounded-md text-xs border border-amber-200 min-w-[45px] text-center shadow-sm">
                                                                    {data.quantity} 份
                                                                </span>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    )}

                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
