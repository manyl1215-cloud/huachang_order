<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>員工午餐/晚餐 點餐系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ⚠️ 請將下方的網址替換成您部署出來的 Google Apps Script 網址
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbymTk53VhOw29AdOO3YtxQDD1E_1H-WVXzDPe4NPBGGn4EMktdR5kxzAMm6RJ0W4GJ8/exec";

        // --- 提取的資料 ---
        const employees = [
            '柳奇宏', '力乃青', '董懿嫺', '李岱娟', '林鈺倖', '林炫均', '黃筱淇', '林家意', 
            '蔡雙全', '吳建毅', '崔文沛', '涂有丞', '林澄洋', '崔顯亞', '湯暉恆', '顏志良', 
            '洪寶清', '孟家榮', '吳國禎', '俞家雄', '黃琮群', '吳欣玫', '滿昱綸', '張嗣賢', 
            '楊瑞銘', '黃瑞琳', '方宗尉', '蔡尚霖', '羅金祺', '王子銘', '劉建仁', '石玉嬋', 
            '賴庭玉', '黃瑞勳', '楊正財', '林于盛', '薛年慶'
        ];

        const menuData = {
            "熱炒類": [
                { name: "合菜戴帽(附餅皮)", price: 220 }, { name: "鳳梨蝦球", price: 240 }, { name: "金沙中卷", price: 240 },
                { name: "京醬肉絲(附餅皮)", price: 220 }, { name: "糖醋魚片", price: 200 }, { name: "蔥爆牛肉", price: 210 },
                { name: "蔥爆豬肉", price: 180 }, { name: "宮保雞丁", price: 200 }, { name: "金沙豆腐", price: 160 },
                { name: "椒鹽杏鮑菇", price: 150 }, { name: "蝦仁炒蛋", price: 180 }, { name: "開陽白菜", price: 150 },
                { name: "鹹蛋苦瓜", price: 150 }, { name: "紅燒家常豆腐", price: 150 }, { name: "菜脯蛋", price: 120 },
                { name: "炒空心菜", price: 80 }, { name: "炒高麗菜", price: 80 }, { name: "水蓮", price: 120 },
                { name: "沙茶羊肉", price: 180 }
            ],
            "飯/粥類": [
                { name: "排骨飯", price: 100 }, { name: "沙茶牛肉炒飯", price: 110 }, { name: "肉絲蛋炒飯", price: 80 },
                { name: "蝦仁蛋炒飯", price: 90 }, { name: "鮭魚蛋炒飯", price: 90 }, { name: "鳳梨炒飯", price: 80 },
                { name: "素食炒飯", price: 80 }, { name: "豬肉燴飯", price: 80 }, { name: "牛肉燴飯", price: 110 },
                { name: "羊肉燴飯", price: 100 }, { name: "老鍋肉燥飯", price: 50 }, { name: "小米粥", price: 30 },
                { name: "白飯", price: 15 }
            ],
            "麵類": [
                { name: "牛肉炒麵", price: 110 }, { name: "三鮮炒麵", price: 100 }, { name: "木須肉炒麵", price: 90 },
                { name: "素食炒麵", price: 80 }, { name: "牛肉炒貓耳朵", price: 110 }, { name: "三鮮炒貓耳朵", price: 100 },
                { name: "木須肉炒貓耳朵", price: 90 }, { name: "牛肉炒餅", price: 130 }, { name: "三鮮炒餅", price: 110 },
                { name: "木須肉炒餅", price: 100 }, { name: "牛半筋半肉麵", price: 160 }, { name: "清燉牛肉麵", price: 140 },
                { name: "紅燒牛肉麵", price: 140 }, { name: "大滷麵", price: 100 }, { name: "餛飩湯麵", price: 80 },
                { name: "榨菜肉絲麵", price: 80 }, { name: "酸辣麵", price: 85 }, { name: "醡醬麵", price: 75 },
                { name: "麻醬麵", price: 75 }, { name: "紅油抄手(單點)", price: 70 }, { name: "肉燥乾麵", price: 75 }
            ],
            "餃/包/餅類": [
                { name: "招牌水餃", price: 7 }, { name: "韭菜盒", price: 40 }, { name: "豬肉餡餅(顆)", price: 50 },
                { name: "牛肉餡餅(顆)", price: 55 }, { name: "蔥油餅", price: 60 }, { name: "(甜)烙餅", price: 70 },
                { name: "(鹹)烙餅", price: 70 }, { name: "酸辣湯餃", price: 90 }, { name: "牛肉湯餃", price: 90 },
                { name: "榨菜肉絲湯餃", price: 90 }, { name: "花素蒸餃", price: 100 }, { name: "蝦仁蒸餃", price: 100 },
                { name: "小籠湯包", price: 100 }, { name: "生菜沙拉捲餅", price: 90 }, { name: "豬肉捲餅", price: 90 },
                { name: "燻雞肉捲餅", price: 90 }, { name: "牛肉捲餅", price: 110 }, { name: "鍋貼", price: 60 },
                { name: "蛋黃流沙包", price: 35 }, { name: "芝麻流沙包", price: 35 }
            ],
            "湯類": [
                { name: "紫菜湯", price: 25 }, { name: "酸辣湯", price: 40 }, { name: "玉米濃湯", price: 40 },
                { name: "青菜豆腐湯", price: 40 }, { name: "青菜蛋花湯", price: 40 }, { name: "蛤蜊湯", price: 50 },
                { name: "苦瓜排骨湯", price: 50 }
            ]
        };

        const App = () => {
            const [selectedUser, setSelectedUser] = useState("");
            const [cart, setCart] = useState({});
            const [orders, setOrders] = useState([]);
            const [activeCategory, setActiveCategory] = useState("熱炒類");
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [syncStatus, setSyncStatus] = useState("載入中...");

            // 初始化：載入本地訂單並從 Google Sheet 獲取最新資料
            useEffect(() => {
                const savedOrders = localStorage.getItem('localOrders');
                if (savedOrders) setOrders(JSON.parse(savedOrders));
                
                if (SCRIPT_URL && SCRIPT_URL.includes("script.google.com")) {
                    fetchOrders(SCRIPT_URL);
                } else {
                    setSyncStatus("未設定雲端網址，使用單機模式");
                }
            }, []);

            // 從 Google Sheet 獲取訂單
            const fetchOrders = async (url) => {
                if (!url) return;
                setSyncStatus("同步中...");
                try {
                    const response = await fetch(url + "?action=getOrders");
                    const result = await response.json();
                    if (result.status === "success") {
                        setOrders(result.data);
                        localStorage.setItem('localOrders', JSON.stringify(result.data));
                        setSyncStatus("已與 Google Sheet 同步");
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                    setSyncStatus("同步失敗，請檢查網址");
                }
            };

            const handleUpdateItem = (item, delta) => {
                setCart(prev => {
                    const currentQty = prev[item.name]?.quantity || 0;
                    const newQty = Math.max(0, currentQty + delta);
                    if (newQty === 0) {
                        const newCart = { ...prev };
                        delete newCart[item.name];
                        return newCart;
                    }
                    return { ...prev, [item.name]: { price: item.price, quantity: newQty } };
                });
            };

            const cartTotal = useMemo(() => {
                return Object.values(cart).reduce((sum, item) => sum + (item.price * item.quantity), 0);
            }, [cart]);

            const submitOrder = async () => {
                if (!selectedUser) {
                    alert("請先選擇訂餐人員！");
                    return;
                }
                if (Object.keys(cart).length === 0) {
                    alert("請先選擇餐點！");
                    return;
                }

                setIsSubmitting(true);
                const orderData = {
                    id: Date.now().toString(),
                    user: selectedUser,
                    items: cart,
                    total: cartTotal,
                    timestamp: new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' })
                };

                // 更新本地 UI 狀態
                const newOrders = [orderData, ...orders];
                setOrders(newOrders);
                localStorage.setItem('localOrders', JSON.stringify(newOrders));
                
                // 發送至 Google Sheet
                if (SCRIPT_URL && SCRIPT_URL.includes("script.google.com")) {
                    try {
                        await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify(orderData),
                        });
                    } catch (error) {
                        console.error("提交至 Google Sheet 失敗，但已保存在本地", error);
                    }
                }

                setCart({});
                setIsSubmitting(false);
                alert("點餐成功！");
            };

            const deleteOrder = async (orderId) => {
                if (!confirm("確定要刪除這筆訂單嗎？")) return;
                
                // 1. 更新本地狀態
                const newOrders = orders.filter(o => o.id !== orderId);
                setOrders(newOrders);
                localStorage.setItem('localOrders', JSON.stringify(newOrders));

                // 2. 發送刪除請求至 Google Sheet
                if (SCRIPT_URL && SCRIPT_URL.includes("script.google.com")) {
                    try {
                        await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'delete', id: orderId }),
                        });
                    } catch (error) {
                        console.error("刪除 Google Sheet 資料失敗", error);
                    }
                }
            };

            const copyToExcel = () => {
                if (orders.length === 0) {
                    alert("目前沒有訂單可以複製！");
                    return;
                }
                
                // 建立 Tab 分隔的字串 (TSV)，這樣貼上 Excel 才會自動分格
                let tsv = "時間\t訂餐人\t餐點內容\t總金額\n";
                orders.forEach(order => {
                    const itemsText = Object.entries(order.items)
                        .map(([name, data]) => `${name} x${data.quantity}`)
                        .join(", ");
                    tsv += `${order.timestamp}\t${order.user}\t${itemsText}\t${order.total}\n`;
                });
                
                // 建立臨時的 textarea 來執行複製動作
                const textarea = document.createElement('textarea');
                textarea.value = tsv;
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    alert("✅ 已複製到剪貼簿！您可以直接打開 Excel 並貼上 (Ctrl+V)。");
                } catch (err) {
                    console.error('複製失敗', err);
                    alert("複製失敗，請手動圈選複製。");
                }
                document.body.removeChild(textarea);
            };

            return (
                <div className="max-w-4xl mx-auto p-4 flex flex-col md:flex-row gap-6">
                    {/* 左側：點餐區 */}
                    <div className="flex-1 space-y-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div className="flex justify-between items-center mb-6">
                                <h1 className="text-2xl font-bold text-gray-800">🍽️ 員工點餐系統</h1>
                                <span className="text-xs font-medium px-2 py-1 bg-gray-100 text-gray-600 rounded-full">
                                    狀態: {syncStatus}
                                </span>
                            </div>

                            {/* 選擇員工 */}
                            <div className="mb-6">
                                <label className="block text-gray-700 text-sm font-bold mb-2">👤 請選擇點餐人員</label>
                                <select 
                                    className="w-full border-gray-300 border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white"
                                    value={selectedUser}
                                    onChange={(e) => setSelectedUser(e.target.value)}
                                >
                                    <option value="">-- 點擊選擇姓名 --</option>
                                    {employees.map(emp => (
                                        <option key={emp} value={emp}>{emp}</option>
                                    ))}
                                </select>
                            </div>

                            {/* 菜單分類 */}
                            <div className="flex overflow-x-auto hide-scrollbar gap-2 mb-4 pb-2">
                                {Object.keys(menuData).map(category => (
                                    <button
                                        key={category}
                                        onClick={() => setActiveCategory(category)}
                                        className={`whitespace-nowrap px-4 py-2 rounded-full font-medium transition-colors ${
                                            activeCategory === category 
                                            ? "bg-blue-600 text-white shadow-md" 
                                            : "bg-gray-100 text-gray-600 hover:bg-gray-200"
                                        }`}
                                    >
                                        {category}
                                    </button>
                                ))}
                            </div>

                            {/* 菜單列表 */}
                            <div className="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                                {menuData[activeCategory].map(item => {
                                    const qty = cart[item.name]?.quantity || 0;
                                    return (
                                        <div key={item.name} className="flex justify-between items-center p-3 hover:bg-gray-50 rounded-lg border border-transparent hover:border-gray-100 transition-colors">
                                            <div>
                                                <div className="font-medium text-gray-800">{item.name}</div>
                                                <div className="text-gray-500 text-sm">${item.price}</div>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                {qty > 0 && (
                                                    <button onClick={() => handleUpdateItem(item, -1)} className="w-8 h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center hover:bg-gray-200 font-bold">-</button>
                                                )}
                                                {qty > 0 && <span className="font-semibold w-4 text-center">{qty}</span>}
                                                <button onClick={() => handleUpdateItem(item, 1)} className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200 font-bold">+</button>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>

                    {/* 右側：購物車與訂單板 */}
                    <div className="w-full md:w-80 flex flex-col gap-6">
                        
                        {/* 購物車區塊 */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-4">
                            <h2 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2">🛒 您目前的點餐</h2>
                            
                            {Object.keys(cart).length === 0 ? (
                                <p className="text-gray-400 text-center py-6 text-sm">尚未選擇餐點</p>
                            ) : (
                                <div className="space-y-3 mb-4">
                                    {Object.entries(cart).map(([name, data]) => (
                                        <div key={name} className="flex justify-between text-sm">
                                            <span className="text-gray-700">{name} <span className="text-gray-400">x{data.quantity}</span></span>
                                            <span className="font-medium">${data.price * data.quantity}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            <div className="border-t pt-4 mt-auto">
                                <div className="flex justify-between items-center mb-4">
                                    <span className="font-bold text-gray-800">總計</span>
                                    <span className="text-xl font-bold text-red-600">${cartTotal}</span>
                                </div>
                                <button 
                                    onClick={submitOrder}
                                    disabled={isSubmitting || Object.keys(cart).length === 0}
                                    className={`w-full py-3 rounded-lg font-bold text-white transition-colors ${
                                        isSubmitting || Object.keys(cart).length === 0 
                                        ? "bg-gray-300 cursor-not-allowed" 
                                        : "bg-blue-600 hover:bg-blue-700 shadow-md"
                                    }`}
                                >
                                    {isSubmitting ? "送出中..." : "確認送出"}
                                </button>
                            </div>
                        </div>

                        {/* 即時訂單板 */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex-1">
                            <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                📋 今日訂單總覽
                                <span className="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">{orders.length} 筆</span>
                                <button 
                                    onClick={copyToExcel} 
                                    className="ml-auto text-sm bg-green-500 text-white px-3 py-1.5 rounded-lg hover:bg-green-600 transition-colors shadow-sm font-normal"
                                >
                                    📑 複製到 Excel
                                </button>
                            </h2>
                            <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                                {orders.length === 0 ? (
                                    <p className="text-gray-400 text-center py-6 text-sm">目前尚無人點餐</p>
                                ) : (
                                    orders.map(order => (
                                        <div key={order.id} className="bg-gray-50 p-3 rounded-lg border border-gray-100 relative group">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="font-bold text-blue-800">{order.user}</span>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs text-gray-400">{order.timestamp}</span>
                                                    <button 
                                                        onClick={() => deleteOrder(order.id)} 
                                                        className="text-red-500 hover:text-red-700 text-xs px-2 py-1 rounded bg-red-100 opacity-0 group-hover:opacity-100 transition-opacity"
                                                        title="刪除此筆訂單"
                                                    >
                                                        刪除
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="text-sm space-y-1 mb-2">
                                                {Object.entries(order.items).map(([itemName, itemData]) => (
                                                    <div key={itemName} className="flex justify-between text-gray-600">
                                                        <span>{itemName} x{itemData.quantity}</span>
                                                    </div>
                                                ))}
                                            </div>
                                            <div className="text-right font-semibold text-sm text-gray-800">
                                                總額: ${order.total}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
